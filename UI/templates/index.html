<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rover Swarm Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="layout">
      <header class="topbar panel">
        <div>
          <p class="eyebrow">Laptop Mission Console</p>
          <h1>Rover Swarm Command Center</h1>
        </div>

        <div class="controls">
          <div class="controls-buttons-row">
            <button id="rescan-btn" class="btn btn-soft">Rescan Devices</button>
            <button id="ssh-btn" class="btn btn-outline">SSH Help</button>
          </div>
          <div class="controls-row">
            <p id="rescan-message" class="message action-message controls-message-line"></p>
          </div>
        </div>
      </header>

      <section class="grid">
        <article class="panel camera-panel">
          <div class="camera-header">
            <h2>Camera Feed</h2>
            <div class="stream-switcher" role="group" aria-label="Camera stream selector">
              <button class="stream-btn active" data-stream="video" type="button">Video</button>
              <button class="stream-btn" data-stream="left" type="button">Left</button>
              <button class="stream-btn" data-stream="right" type="button">Right</button>
            </div>
          </div>
          <div class="camera-frame" id="camera-frame">
            <img id="camera-stream-img" alt="Rover camera stream" />
          </div>
          <div class="camera-meta">
            <p id="camera-rover-name">Select a rover to begin.</p>
          </div>
        </article>

        <article class="panel code-panel">
          <h2>Python Command Pad</h2>
          <p class="subtext">Code runs on the currently selected rover.</p>
          <textarea
            id="code-input"
            spellcheck="false"
            placeholder="# Example\nprint('Hello from rover')"
          ></textarea>
          <div class="row">
            <label for="timeout-seconds">Timeout (s)</label>
            <input id="timeout-seconds" type="number" min="1" max="600" step="1" value="60" />
            <button id="execute-btn" class="btn">Execute on Rover</button>
          </div>
          <p id="execute-message" class="message"></p>
        </article>

        <article class="panel mapping-panel">
          <div class="mapping-header">
            <h2>Live Mapping</h2>
            <div class="mapping-controls">
              <button id="mapping-start-btn" class="btn btn-soft" type="button">Start</button>
              <button id="mapping-stop-btn" class="btn btn-soft" type="button">Stop</button>
              <button id="mapping-clear-btn" class="btn btn-outline" type="button">Clear</button>
            </div>
          </div>
          <p id="mapping-status" class="message">Mapping idle.</p>
          <div id="mapping-viewport" class="mapping-viewport"></div>
        </article>

        <article class="panel output-panel">
          <h2>Execution Result</h2>
          <pre id="execution-output">No execution yet.</pre>
        </article>

        <article class="panel health-panel">
          <div class="health-header">
            <div>
              <h2>Rover Health</h2>
              <p class="subtext" id="health-rover-name">No rover selected.</p>
            </div>
            <button id="refresh-health-btn" class="btn btn-soft">Refresh</button>
          </div>

          <div id="health-summary" class="health-summary"></div>
          <p id="health-message" class="message"></p>
        </article>
      </section>
    </main>

    <aside class="rover-rail" aria-label="Rover selection rail">
      <div class="rover-rail-header">
        <h2>Rovers</h2>
        <p class="subtext">Click IP line to edit alias</p>
      </div>
      <div id="rover-tabs" class="rover-tabs" role="tablist" aria-label="Rover tabs"></div>
    </aside>

    <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
      <section class="modal panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <h2 id="modal-title">Dialog</h2>
          <button id="modal-close" class="btn btn-outline" type="button">Close</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </section>
    </div>

    <script>
      window.__INITIAL_STATE__ = {
        rovers: {{ rovers | tojson }},
        activeRover: {{ active_rover | tojson }}
      };
    </script>
    <script src="{{ url_for('static', filename='js/three.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mapping.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>

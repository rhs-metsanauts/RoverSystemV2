config:
  has_zed: true
  has_usb_camera: false
  has_arm: false

servo_hat:
  i2c_bus: 7
  i2c_address: 0x40

rocker_bogie:
  channels: [0, 1, 2, 3]
  sun_position: [150, 35, 90, 90]
  regular_position: [90, 90, 150, 30]

drivetrain:
  motors:
    left:
      channel: 4
    right:
      channel: 5

usb_camera:
  pan:
    channel: 6
    min_angle: 0
    max_angle: 180
  tilt:
    channel: 7
    min_angle: 0
    max_angle: 180

